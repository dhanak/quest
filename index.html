<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Kaland indítása">
    <meta name="theme-color" content="#0e1b27">
    <title>Kalandindító</title>
    <link rel="icon" type="image/svg+xml" href="icons/quest.svg">
    <link rel="apple-touch-icon" href="icons/quest_256.png">
    <link
      href="https://fonts.googleapis.com/css?family=Inconsolata"
      rel="stylesheet">
    <link
      href="https://fonts.googleapis.com/css?family=Roboto+Mono"
      rel="stylesheet">
    <link href="quest.css" rel="stylesheet">
  </head>
  <body class="welcome-page">
    <main class="welcome">
      <img class="welcome-logo" src="icons/quest.svg" alt="">
      <h1>Kalandindító</h1>
      <p>Írd be a kaland nevét, és megnyílik a hozzá tartozó oldal.</p>
      <form class="quest-form" id="quest-form">
        <label for="quest-name">Kaland neve</label>
        <input
          id="quest-name"
          name="quest"
          type="text"
          autocomplete="off"
          autocapitalize="none"
          spellcheck="false"
          required>
        <button type="submit">Megnyitás</button>
        <p class="form-error" id="form-error" aria-live="polite"></p>
      </form>
    </main>
    <a class="qr-link" href="qr.png" aria-label="QR-kód megnyitása">
      <span aria-hidden="true"></span>
    </a>
    <script>
      function normalizeQuestName(value) {
        return value.trim()
          .replace(/\.html$/i, '')
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .replace(/\s+/g, '')
          .toLowerCase();
      }

      document.getElementById('quest-form').addEventListener(
        'submit',
        function(evt) {
          evt.preventDefault();

          var field = document.getElementById('quest-name');
          var error = document.getElementById('form-error');
          var name = normalizeQuestName(field.value);

          if (!name || /[\/\\?#]/.test(name)) {
            error.textContent = 'Adj meg érvényes kalandnevet.';
            field.focus();
            return;
          }

          window.location.href = encodeURIComponent(name) + '.html';
        }
      );
    </script>
  </body>
</html>
